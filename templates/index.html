<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">🌤️ Weather App</h1>
        <p class="text-light">Check weather instantly</p>
    </div>

    <!-- Search Box -->
    <form method="POST" class="d-flex justify-content-center mb-4">
        <input 
            type="text" 
            name="city" 
            class="form-control w-50 me-2" 
            placeholder="Enter city..." 
            required>
        <button class="btn btn-primary">Search</button>
    </form>

    {% if weather %}
    <!-- Weather Card -->
    <div class="card bg-secondary text-white mx-auto shadow-lg" style="max-width: 400px;">
        <div class="card-body text-center">

            <h2 class="card-title">{{ weather.city }}</h2>

            <!-- Icon -->
            <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">

            <h3 class="my-3">{{ weather.temp }} °C</h3>
            <p class="text-capitalize">{{ weather.description }}</p>

            <hr>

            <div class="d-flex justify-content-between px-3">
                <div>
                    <p class="mb-1">💧 Humidity</p>
                    <strong>{{ weather.humidity }}%</strong>
                </div>
                <div>
                    <p class="mb-1">🌬️ Wind</p>
                    <strong>{{ weather.wind }} m/s</strong>
                </div>
            </div>

        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
