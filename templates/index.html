<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body>
    <h1>Weather App</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city">
        <button type="submit">Get Weather</button>
    </form>

    {% if weather %}
        <h2>{{ weather.city }}</h2>
        <p>Temperature: {{ weather.temp }} °C</p>
        <p>Condition: {{ weather.description }}</p>
    {% endif %}
</body>
</html>
